services:
  - type: web
    name: useme-ai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build --prefix client && npm install --prefix server
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
